name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        # Strips the leading "v" from the tag: v1.0.1 -> 1.0.1
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Release .app
        run: |
          xcodebuild \
            -project "Hot Corner Toggle.xcodeproj" \
            -scheme "Hot Corner Toggle" \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION=${{ steps.version.outputs.VERSION }} \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build

      - name: Ad-hoc sign the .app bundle
        run: |
          APP="build/Build/Products/Release/Hot Corner Toggle.app"
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Zip the .app bundle
        run: |
          cd build/Build/Products/Release
          ditto -c -k --keepParent "Hot Corner Toggle.app" "Hot-Corner-Toggle-macOS.zip"

      - name: Create GitHub Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/Build/Products/Release/Hot-Corner-Toggle-macOS.zip
