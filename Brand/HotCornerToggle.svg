  </g>
  <rect x="83" y="71" width="858" height="858" rx="195" fill="none" stroke="url(#rim)" stroke-width="6"/>
  <path d="M171 326V263C171 211 213 169 265 169H328" fill="none" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="42" stroke-linecap="round"/>

