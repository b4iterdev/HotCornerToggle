<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Hot Corner Toggle app icon">
  <defs>
    <linearGradient id="tile" x1="166" y1="106" x2="858" y2="918" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#27333B"/>
      <stop offset="0.52" stop-color="#121B21"/>
      <stop offset="1" stop-color="#091014"/>
    </linearGradient>
    <linearGradient id="rim" x1="238" y1="180" x2="786" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.46" stop-color="#A8D9E5" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.34"/>
    </linearGradient>
    <linearGradient id="corner" x1="238" y1="238" x2="786" y2="786" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8DF7FF"/>
      <stop offset="0.52" stop-color="#28D8E8"/>
      <stop offset="1" stop-color="#08AFC5"/>
    </linearGradient>
    <linearGradient id="switchTrack" x1="368" y1="438" x2="656" y2="586" gradientUnits="userSpaceOnUse">
