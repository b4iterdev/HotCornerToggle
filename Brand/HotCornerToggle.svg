    </filter>
    <filter id="knobGlow" x="480" y="390" width="260" height="244" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="9" stdDeviation="14" flood-color="#FFB635" flood-opacity="0.48"/>
    </filter>
